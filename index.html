<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0060FE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumostage">
<meta name="description" content="BC Film & TV Production Schedule — Lumostage Virtual Production">
<link rel="manifest" href="manifest.json">
<title>Lumostage — BC Production Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#0d1117;--surface:#161c24;--raised:#1e2733;--border:#243040;
  --blue:#0060fe;--deep:#144ba0;--seafoam:#00efea;--salmon:#ff6169;
  --white:#fff;--text:#e8edf2;--mid:#7a8ea8;--dim:#3d5068;
  --c-rumour:#2d3f55;
  --row-h:46px;--label-w:270px;--tick-h:34px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --sb-open:150px;
  --sb-closed:30px;
}
body{
  background:var(--dark);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:14px;
  min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* HEADER */
.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:2px solid var(--blue);
  display:flex;align-items:center;gap:14px;padding:0 20px;height:60px;
}
.logo{width:36px;height:36px;flex-shrink:0;mix-blend-mode:screen;object-fit:contain}
.titles h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:.1em;text-transform:uppercase;color:var(--white);line-height:1}
.titles p{font-size:10px;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.hdr-gap{flex:1}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mid)}
select{background:var(--raised);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:5px 9px;border-radius:4px;cursor:pointer;outline:none;transition:border-color .15s}
select:focus{border-color:var(--blue)}
.pill{background:var(--raised);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--mid);white-space:nowrap}
.pill strong{color:var(--seafoam);font-weight:600}
.zbtn{background:var(--raised);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.zbtn:hover{background:var(--border)}
.updated-lbl{font-size:11px;color:var(--dim)}
.vt{display:flex;gap:4px}
.vtbtn{background:var(--raised);border:1px solid var(--border);color:var(--mid);padding:4px 11px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.vtbtn.on{background:var(--deep);border-color:var(--blue);color:var(--white)}
.hdr-mob{display:none;align-items:center;gap:6px}
.icobtn{background:var(--raised);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .15s;-webkit-tap-highlight-color:transparent}
.icobtn:active{background:var(--border)}

/* STATES */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--mid)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state.err .spinner{border-top-color:var(--salmon)}
.state.err p{color:var(--salmon);max-width:480px;text-align:center;line-height:1.6}

/* LEGEND */
.legend{display:flex;align-items:center;gap:12px;padding:7px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--surface);overflow-x:auto}
.legend::-webkit-scrollbar{display:none}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--mid);cursor:pointer;transition:color .15s;user-select:none;white-space:nowrap;flex-shrink:0}
.leg:hover{color:var(--text)}
.leg.off{opacity:.25}
.swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* GANTT LAYOUT */
.gantt-wrap{display:flex;overflow:hidden}

.g-labels{
  width:var(--label-w);flex-shrink:0;
  border-right:1px solid var(--border);background:var(--surface);
  z-index:10;overflow:hidden;
  transition:width .22s cubic-bezier(.4,0,.2,1);
}
.label-hdr{height:var(--tick-h);border-bottom:1px solid var(--border);padding:0 10px;display:flex;align-items:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim)}
.sb-tog{display:none;background:none;border:none;color:var(--mid);font-size:14px;cursor:pointer;padding:3px 4px;line-height:1;flex-shrink:0;transition:transform .22s}
.sb-tog:active{color:var(--seafoam)}

.label-row{height:var(--row-h);display:flex;align-items:center;padding:0 10px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.label-row:active{background:var(--raised)}
.label-row.rumour{opacity:.5}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.label-text{flex:1;min-width:0;overflow:hidden}
.l-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.l-sub{font-size:10px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Collapsed sidebar state */
.gantt-wrap.sb-off .g-labels{width:var(--sb-closed)}
.gantt-wrap.sb-off .label-text{display:none}
.gantt-wrap.sb-off .lhdr-txt{display:none}
.gantt-wrap.sb-off .label-row{padding:0;justify-content:center}
.gantt-wrap.sb-off .sb-tog{transform:scaleX(-1)}

.g-scroll{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.g-scroll::-webkit-scrollbar{height:4px}
.g-scroll::-webkit-scrollbar-track{background:var(--surface)}
.g-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.g-canvas{position:relative;height:fit-content}

/* Ticks */
.tick-hdr{position:sticky;top:0;z-index:5;height:var(--tick-h);background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden}
.tick{position:absolute;top:0;height:100%;border-left:1px solid var(--border);display:flex;align-items:center;padding-left:5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
.tick.q{color:var(--text);border-left-color:#2d4060}

/* Rows & bars */
.g-row{height:var(--row-h);position:relative;border-bottom:1px solid var(--border);transition:background .1s}
.g-row:hover{background:rgba(255,255,255,.02)}
.grid-line{position:absolute;top:0;bottom:0;border-left:1px solid var(--border)}
.grid-line.q{border-left-color:#2d4060}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--seafoam);z-index:4;pointer-events:none}
.today-lbl{position:absolute;top:0;transform:translateX(-50%);background:var(--seafoam);color:var(--dark);font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:0 0 3px 3px;white-space:nowrap;pointer-events:none}

/* Bar: NO transform transition to avoid conflicting with scroll gesture */
.bar{position:absolute;top:50%;transform:translateY(-50%);height:26px;min-width:4px;border-radius:4px;cursor:pointer;display:flex;align-items:center;overflow:hidden;transition:filter .12s;will-change:filter}
.bar:hover{filter:brightness(1.3);z-index:3}
.bar.tapped{filter:brightness(1.6)}
.bar-lbl{padding:0 8px;font-size:10px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.03em;color:rgba(0,0,0,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.bar.rumour{opacity:.4;background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,.15) 4px,rgba(255,255,255,.15) 8px)!important}
.bar-pin{position:absolute;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--mid);border-radius:1px}
@keyframes barIn{from{transform:translateY(-50%) scaleX(0);opacity:0}to{transform:translateY(-50%) scaleX(1);opacity:1}}
.bar.anim{animation:barIn .38s cubic-bezier(.22,.68,0,1.2) both;transform-origin:left center}

/* DESKTOP TOOLTIP */
#tip{position:fixed;z-index:999;pointer-events:none;background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:14px 16px;min-width:240px;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.65);opacity:0;transition:opacity .1s}
#tip.on{opacity:1}
.tip-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--white);margin-bottom:9px;line-height:1.2}
.tip-row{display:flex;gap:9px;margin-bottom:4px;font-size:12px}
.tip-lbl{color:var(--mid);min-width:88px}
.tip-val{color:var(--text);flex:1}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase;margin-top:7px}

/* CARD VIEW */
.card-wrap{padding:12px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 14px 14px 16px;cursor:pointer;position:relative;overflow:hidden;transition:background .1s}
.card:active{background:var(--raised)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--white);flex:1;line-height:1.2}
.type-badge{font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:3px;flex-shrink:0;margin-top:1px}
.rumour-badge{display:inline-block;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--c-rumour);color:#aaa;margin-left:8px;vertical-align:middle}
.card-co{font-size:12px;color:var(--mid);margin-bottom:6px;padding-left:20px}
.card-dates{font-size:12px;color:var(--mid);padding-left:20px}
.card-dates strong{color:var(--text);font-weight:500}
.card-crew{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;padding-left:20px}
.crew-tag{font-size:10px;background:var(--raised);border:1px solid var(--border);border-radius:3px;padding:2px 6px;color:var(--mid)}
.crew-tag span{color:var(--text)}

/* BOTTOM SHEET */
.sh-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s}
.sh-bg.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--surface);border-top:2px solid var(--blue);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + var(--safe-bottom))}
.sheet.on{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;cursor:pointer;transition:background .15s}
.sh-handle:hover,.sh-handle:active{background:var(--mid)}
/* Larger invisible tap area above/below the handle */
.sh-handle-wrap{padding:10px 0 6px;display:flex;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sh-bar{height:3px;margin:16px 0 14px}
.sh-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--white);padding:0 20px;margin-bottom:4px;line-height:1.2}
.sh-co{font-size:13px;color:var(--mid);padding:0 20px;margin-bottom:14px}
.sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:14px}
.sh-stat{background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.sh-stat .sl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:4px}
.sh-stat .sv{font-size:14px;color:var(--text);font-weight:500}
.sh-crew{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.sh-ci{display:flex;gap:12px;align-items:baseline}
.sh-ci .r{font-size:11px;color:var(--mid);min-width:120px;text-transform:uppercase;letter-spacing:.04em}
.sh-ci .n{font-size:14px;color:var(--text)}
.sh-div{height:1px;background:var(--border);margin:12px 20px}
.sh-src{padding:0 20px;font-size:11px;color:var(--dim)}

/* FILTER DRAWER (mobile) */
.fd-bg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s}
.fd-bg.on{opacity:1;pointer-events:all}
.fd{position:fixed;bottom:0;left:0;right:0;z-index:401;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding:0 20px calc(20px + var(--safe-bottom))}
.fd.on{transform:translateY(0)}
.fd-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:14px}
.fd-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:var(--white)}
.fd-x{background:none;border:none;color:var(--mid);font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
.fd-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);margin-bottom:8px}
.fd-sel{width:100%;background:var(--raised);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;border-radius:6px;outline:none;margin-bottom:14px}
.fd-zrow{display:flex;gap:10px;margin-bottom:14px}
.fd-zbtn{flex:1;background:var(--raised);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;cursor:pointer;font-size:20px;text-align:center}
.fd-zbtn:active{background:var(--border)}
.fd-info{font-size:12px;color:var(--mid);margin-bottom:14px}
.fd-info strong{color:var(--seafoam)}
.fd-apply{width:100%;padding:13px;background:var(--blue);border:none;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:6px;cursor:pointer}
.fd-apply:active{background:var(--deep)}

footer{text-align:center;padding:16px 20px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);margin-top:8px;padding-bottom:calc(16px + var(--safe-bottom))}
footer a{color:var(--blue);text-decoration:none}

/* RESPONSIVE */
@media(max-width:639px){
  :root{--label-w:var(--sb-open);--row-h:42px}
  .site-header{height:56px;padding:0 12px;gap:10px}
  .titles p{display:none}
  .controls{display:none}
  .hdr-mob{display:flex}
  .legend{padding:6px 12px}
  .sb-tog{display:flex;align-items:center;justify-content:center}
}
@media(min-width:640px){
  .hdr-mob{display:none}
  .fd,.fd-bg{display:none!important}
}
@media(min-width:640px) and (max-width:1023px){
  :root{--label-w:200px}
  .site-header{flex-wrap:wrap;height:auto;padding:10px 16px;gap:8px}
  .controls{flex-wrap:wrap;gap:8px}
}
@media(min-width:1024px){
  :root{--label-w:270px}
  .site-header{height:68px;padding:0 24px;gap:18px}
}
</style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────
let PPD = 5;
const TC = {
  'Feature':'#f5a623','TV Series':'#0060fe','TV Movie':'#00efea',
  'TV Pilot':'#9b7fff','Mini Series':'#ff8c42','Documentary Feature':'#4cde9a',
  'Doc Series':'#4cde9a','Reality/Lifestyle':'#ff6169',
  'New Media Series':'#c47eff','Series (New Media)':'#c47eff',
  'Feature (New Media)':'#c47eff','TV Movie (New Media)':'#c47eff',
  'Short Film':'#ffce5a'
};
const tc   = t => TC[t]||'#607080';
const pd   = s => s ? new Date(s+'T00:00:00') : null;
const diff = (a,b)=> Math.round((b-a)/86400000);
const fmtd = d => d ? d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}) : '—';
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const mob  = () => window.innerWidth < 640;

let allProds=[], activeTypes=new Set(['__all']), curView='gantt', sbOpen=true;

// ── TAP vs DRAG DETECTION ─────────────────────────────────
// All touch listeners use passive:true so the browser never waits for JS
// before deciding to scroll. We only open a sheet if the finger barely moved.
const TAP_PX = 10;   // max movement in px to count as a tap
const TAP_MS = 280;  // max duration in ms to count as a tap
let tx0=0, ty0=0, tt0=0;

function onTouchStart(ev) {
  const t = ev.touches[0];
  tx0 = t.clientX; ty0 = t.clientY; tt0 = Date.now();
}
function isTap(ev) {
  const t = ev.changedTouches[0];
  return Math.abs(t.clientX-tx0) < TAP_PX &&
         Math.abs(t.clientY-ty0) < TAP_PX &&
         Date.now()-tt0 < TAP_MS;
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  try {
    const res  = await fetch('data.json?t='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    allProds = (json.productions||[]).filter(p=>p.title);
    document.getElementById('upd').textContent = json.updated ? 'Updated '+json.updated : '';
    render();
    show('main');
  } catch(e) {
    document.getElementById('errMsg').textContent = 'Could not load data.json. '+e.message;
    show('sErr');
  }
}

function show(id) {
  ['sLoad','sErr','main'].forEach(i=>
    document.getElementById(i).style.display = i===id?'':'none');
}

// ── VIEW ──────────────────────────────────────────────────
function setView(v) {
  curView = v;
  document.getElementById('vGantt').style.display = v==='gantt'?'':'none';
  document.getElementById('vCards').style.display = v==='cards'?'':'none';
  document.getElementById('btnG').classList.toggle('on', v==='gantt');
  document.getElementById('btnC').classList.toggle('on', v==='cards');
  const mb = document.getElementById('mViewBtn');
  mb.textContent = v==='gantt' ? '☰' : '▦';
  redraw();
}
function toggleView() { setView(curView==='gantt'?'cards':'gantt'); }

// ── SIDEBAR ───────────────────────────────────────────────
function toggleSidebar() {
  sbOpen = !sbOpen;
  document.getElementById('gWrap').classList.toggle('sb-off', !sbOpen);
}

// ── FILTERS ───────────────────────────────────────────────
function getF() {
  return {
    type:   document.getElementById('dType').value,
    status: document.getElementById('dStatus').value
  };
}
function filtered() {
  const {type,status} = getF();
  return allProds.filter(p => {
    if (type   && p.type!==type)                           return false;
    if (status && (p.status||'').toUpperCase()!==status)   return false;
    if (!activeTypes.has('__all') && !activeTypes.has(p.type)) return false;
    return true;
  });
}
function setPill(n,s) {
  const h = `<strong>${n}</strong> shown &nbsp;&middot;&nbsp; <strong>${s}</strong> scheduled`;
  document.getElementById('pill').innerHTML = h;
  document.getElementById('mPill').innerHTML = h;
}

// mobile filter drawer
function openFd()  { document.getElementById('fd').classList.add('on'); document.getElementById('fdBg').classList.add('on'); }
function closeFd() { document.getElementById('fd').classList.remove('on'); document.getElementById('fdBg').classList.remove('on'); }
function applyFd() {
  document.getElementById('dType').value   = document.getElementById('mType').value;
  document.getElementById('dStatus').value = document.getElementById('mStatus').value;
  closeFd(); redraw();
}
function zoom(d) { PPD=Math.max(2,Math.min(22,PPD+d)); if(curView==='gantt') renderGantt(filtered()); }

// ── RENDER ────────────────────────────────────────────────
function render() {
  const types=[...new Set(allProds.map(p=>p.type).filter(Boolean))].sort();
  ['dType','mType'].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">All types</option>';
    types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o);});
  });
  document.getElementById('dType').onchange   = redraw;
  document.getElementById('dStatus').onchange = redraw;

  activeTypes=new Set(['__all']);
  const leg=document.getElementById('legend'); leg.innerHTML='';
  types.forEach(t=>{
    const el=document.createElement('div'); el.className='leg'; el.dataset.type=t;
    el.innerHTML=`<span class="swatch" style="background:${tc(t)}"></span>${t}`;
    el.onclick=()=>toggleType(t); leg.appendChild(el);
  });
  const rEl=document.createElement('div'); rEl.className='leg';
  rEl.innerHTML='<span class="swatch" style="background:var(--c-rumour)"></span>Rumour';
  leg.appendChild(rEl);
  redraw();
}
function redraw() { filtered().length||0; const f=filtered(); curView==='gantt'?renderGantt(f):renderCards(f); }
function toggleType(t) {
  if(activeTypes.has('__all')){activeTypes=new Set([t]);}
  else if(activeTypes.has(t)){activeTypes.delete(t);if(!activeTypes.size)activeTypes=new Set(['__all']);}
  else{activeTypes.add(t);}
  document.querySelectorAll('.leg[data-type]').forEach(e=>
    e.classList.toggle('off',!activeTypes.has('__all')&&!activeTypes.has(e.dataset.type)));
  redraw();
}

// ── GANTT ─────────────────────────────────────────────────
function renderGantt(prods) {
  const sorted=[...prods].sort((a,b)=>{
    const da=pd(a.start),db=pd(b.start);
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;
  });
  const starts=sorted.map(p=>pd(p.start)).filter(Boolean);
  const ends  =sorted.map(p=>pd(p.end)).filter(Boolean);
  setPill(sorted.length, starts.length);

  // Rebuild labels — keep the header element
  const gl=document.getElementById('gLabels');
  const hdrEl=document.getElementById('lHdr');
  gl.innerHTML=''; gl.appendChild(hdrEl);

  if (!starts.length) { document.getElementById('gCanvas').innerHTML=''; return; }

  const rS=new Date(Math.min(...starts)); rS.setDate(rS.getDate()-28);
  const rE=new Date(Math.max(...ends,...starts)); rE.setDate(rE.getDate()+28);
  const W=diff(rS,rE)*PPD;
  const RH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h'))||46;

  sorted.forEach(p=>{
    const rum=(p.status||'').toUpperCase()==='RUMOUR';
    const row=document.createElement('div');
    row.className='label-row'+(rum?' rumour':'');
    row.innerHTML=`<span class="dot" style="background:${tc(p.type)}"></span>
      <div class="label-text">
        <div class="l-title" title="${esc(p.title)}">${esc(p.title)}</div>
        <div class="l-sub">${esc(p.company||p.type||'')}</div>
      </div>`;
    // Tap detection (passive — never blocks scroll)
    row.addEventListener('touchstart', onTouchStart, {passive:true});
    row.addEventListener('touchend', ev=>{ if(isTap(ev)) showSheet(p); }, {passive:true});
    // click handles desktop AND the 300ms synthetic-click on mobile (guarded by sheetOpenedAt)
    row.addEventListener('click', ()=>showSheet(p));
    gl.appendChild(row);
  });

  const cv=document.getElementById('gCanvas');
  cv.style.width=W+'px'; cv.innerHTML='';

  // Tick header
  const th=document.createElement('div'); th.className='tick-hdr'; th.style.width=W+'px';
  mkTicks(th,rS,rE); cv.appendChild(th);

  // Today line
  const now=new Date();
  if(now>=rS&&now<=rE){
    const tx=diff(rS,now)*PPD;
    const tl=document.createElement('div'); tl.className='today-line';
    tl.style.cssText=`left:${tx}px;height:${sorted.length*RH+34}px`; cv.appendChild(tl);
    const tlb=document.createElement('div'); tlb.className='today-lbl'; tlb.textContent='TODAY';
    tlb.style.left=tx+'px'; cv.appendChild(tlb);
  }

  sorted.forEach((p,idx)=>{
    const rum=(p.status||'').toUpperCase()==='RUMOUR';
    const row=document.createElement('div'); row.className='g-row'; row.style.width=W+'px';
    mkGrid(row,rS,rE);
    const s=pd(p.start),e=pd(p.end);
    if(s&&e&&e>=s){
      const x=diff(rS,s)*PPD, w=Math.max(4,diff(s,e)*PPD);
      const bar=document.createElement('div');
      bar.className='bar anim'+(rum?' rumour':'');
      bar.style.cssText=`left:${x}px;width:${w}px;background:${rum?'#2d3f55':tc(p.type)};animation-delay:${idx*14}ms`;
      if(w>50){const bl=document.createElement('span');bl.className='bar-lbl';bl.textContent=p.title;bar.appendChild(bl);}

      // Desktop hover tooltip
      bar.addEventListener('mouseenter', ev=>showTip(ev,p));
      bar.addEventListener('mousemove',  ev=>moveTip(ev));
      bar.addEventListener('mouseleave', hideTip);

      // Mobile: passive touch — only open sheet on confirmed tap (not drag)
      bar.addEventListener('touchstart', onTouchStart, {passive:true});
      bar.addEventListener('touchend', ev=>{
        if(isTap(ev)){
          bar.classList.add('tapped');
          setTimeout(()=>bar.classList.remove('tapped'),200);
          showSheet(p);
        }
        // If NOT a tap, do nothing — scroll continues normally
      }, {passive:true});

      row.appendChild(bar);
    } else if(s){
      const pin=document.createElement('div');
      pin.className='bar-pin'; pin.style.left=diff(rS,s)*PPD+'px'; row.appendChild(pin);
    }
    cv.appendChild(row);
  });

  // Scroll to today
  const tx2=diff(rS,now)*PPD;
  const sc=document.getElementById('gScroll');
  setTimeout(()=>{ sc.scrollLeft=Math.max(0,tx2-sc.clientWidth/2); },80);
}

function mkTicks(cont,rS,rE){
  const c=new Date(rS); c.setDate(1);
  while(c<=rE){
    const x=diff(rS,c)*PPD, isQ=c.getMonth()%3===0;
    const el=document.createElement('div'); el.className='tick'+(isQ?' q':''); el.style.left=x+'px';
    el.textContent=isQ?c.toLocaleDateString('en-US',{month:'short'})+' '+c.getFullYear():c.toLocaleDateString('en-US',{month:'short'});
    cont.appendChild(el); c.setMonth(c.getMonth()+1);
  }
}
function mkGrid(row,rS,rE){
  const c=new Date(rS); c.setDate(1);
  while(c<=rE){
    const gl=document.createElement('div'); gl.className='grid-line'+(c.getMonth()%3===0?' q':'');
    gl.style.left=diff(rS,c)*PPD+'px'; row.appendChild(gl); c.setMonth(c.getMonth()+1);
  }
}

// ── DESKTOP TOOLTIP ───────────────────────────────────────
const tip=document.getElementById('tip');
function showTip(ev,p){
  if(mob())return;
  const dur=p.start&&p.end?diff(pd(p.start),pd(p.end))+' days':'—';
  const rum=(p.status||'').toUpperCase()==='RUMOUR';
  const rows=[['Company',p.company],['Type',p.type],['Camera',fmtd(pd(p.start))],['Wrap',fmtd(pd(p.end))],['Duration',dur],['Director',p.director],['PM',p.productionManager],['Producer',p.producer],['Sources',p.sources]].filter(r=>r[1]);
  tip.innerHTML=`<div class="tip-title">${esc(p.title)}</div>${rows.map(r=>`<div class="tip-row"><span class="tip-lbl">${r[0]}</span><span class="tip-val">${esc(r[1])}</span></div>`).join('')}${rum?`<span class="badge" style="background:var(--c-rumour);color:#aaa">Rumour</span>`:''}`;
  moveTip(ev); tip.classList.add('on');
}
function moveTip(ev){
  if(mob())return;
  const m=14,tw=tip.offsetWidth,th2=tip.offsetHeight;
  let x=ev.clientX+m,y=ev.clientY+m;
  if(x+tw>innerWidth-m)x=ev.clientX-tw-m;
  if(y+th2>innerHeight-m)y=ev.clientY-th2-m;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){tip.classList.remove('on');}

// ── BOTTOM SHEET ──────────────────────────────────────────
// Sheet open timestamp — used to swallow the synthetic click that browsers fire
// ~300ms after a touchend, which would otherwise immediately close the sheet.
let sheetOpenedAt = 0;

function showSheet(p){
  sheetOpenedAt = Date.now();
  const rum=(p.status||'').toUpperCase()==='RUMOUR';
  const s=pd(p.start),e=pd(p.end);
  const dur=s&&e?diff(s,e)+' days':'—';
  const color=rum?'#607080':tc(p.type);
  const crew=[
    ['Executive Producer',p.executiveProducer],
    ['Producer',p.producer],
    ['Director',p.director],
    ['Production Manager',p.productionManager],
    ['Prod. Coordinator',p.productionCoordinator],
    ['Location Manager',p.locationManager],
  ].filter(r=>r[1]);
  document.getElementById('shBody').innerHTML=`
    <div class="sh-bar" style="background:${color}"></div>
    <div class="sh-title">${esc(p.title)}</div>
    ${p.company?`<div class="sh-co">${esc(p.company)}</div>`:'<div style="height:10px"></div>'}
    <div class="sh-grid">
      <div class="sh-stat"><div class="sl">Camera</div><div class="sv">${fmtd(s)}</div></div>
      <div class="sh-stat"><div class="sl">Wrap</div><div class="sv">${fmtd(e)}</div></div>
      <div class="sh-stat"><div class="sl">Duration</div><div class="sv">${dur}</div></div>
      <div class="sh-stat"><div class="sl">Type</div><div class="sv" style="color:${color}">${esc(p.type||'—')}</div></div>
    </div>
    ${rum?`<div style="padding:0 20px;margin-bottom:12px"><span class="rumour-badge" style="font-size:11px;padding:4px 9px">⚠ Rumoured</span></div>`:''}
    ${crew.length?`
      <div class="sh-div"></div>
      <div style="padding:0 20px;margin-bottom:10px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim)">Key Crew</div>
      <div class="sh-crew">${crew.map(([r,n])=>`<div class="sh-ci"><span class="r">${r}</span><span class="n">${esc(n)}</span></div>`).join('')}</div>
    `:''}
    ${p.sources?`<div class="sh-div"></div><div class="sh-src">Sources: ${esc(p.sources)}</div>`:''}
    <div style="height:8px"></div>`;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('shBg').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  if (Date.now() - sheetOpenedAt < 400) return; // swallow synthetic post-touch click
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('shBg').classList.remove('on');
  document.body.style.overflow='';
}

// ── CARDS ─────────────────────────────────────────────────
function renderCards(prods){
  const sorted=[...prods].sort((a,b)=>{
    const da=pd(a.start),db=pd(b.start);
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;
  });
  const starts=sorted.map(p=>pd(p.start)).filter(Boolean);
  setPill(sorted.length,starts.length);
  const cl=document.getElementById('cardList'); cl.innerHTML='';
  if(!sorted.length){cl.innerHTML='<div class="state" style="height:40vh"><p style="color:var(--mid)">No productions match filters.</p></div>';return;}
  sorted.forEach(p=>{
    const rum=(p.status||'').toUpperCase()==='RUMOUR';
    const color=rum?'#607080':tc(p.type);
    const s=pd(p.start),e=pd(p.end);
    const crew=[];
    if(p.director)          crew.push(['Dir',p.director]);
    if(p.productionManager) crew.push(['PM',p.productionManager]);
    if(p.producer)          crew.push(['Prod',p.producer]);
    const card=document.createElement('div'); card.className='card';
    card.style.borderColor=color+'44';
    const acc=document.createElement('div');
    acc.style.cssText=`position:absolute;left:0;top:0;bottom:0;width:3px;background:${color};border-radius:8px 0 0 8px`;
    card.appendChild(acc);
    card.innerHTML+=`
      <div class="card-top">
        <span class="card-dot" style="background:${color}"></span>
        <span class="card-title">${esc(p.title)}${rum?'<span class="rumour-badge">Rumour</span>':''}</span>
        <span class="type-badge" style="background:${color}22;color:${color}">${esc(p.type||'?')}</span>
      </div>
      ${p.company?`<div class="card-co">${esc(p.company)}</div>`:''}
      <div class="card-dates">${s?`📅 <strong>${fmtd(s)}</strong>${e?' – <strong>'+fmtd(e)+'</strong>':''}`:' <span style="color:var(--dim)">Dates TBD</span>'}</div>
      ${crew.length?`<div class="card-crew">${crew.map(([r,n])=>`<span class="crew-tag">${r}: <span>${esc(n)}</span></span>`).join('')}</div>`:''}`;
    card.addEventListener('click',()=>showSheet(p));
    cl.appendChild(card);
  });
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeSheet();closeFd();} });

// Wire overlay dismissals here (not inline onclick) so closeSheet's guard applies
document.getElementById('shBg').addEventListener('click', closeSheet);
document.getElementById('shBg').addEventListener('touchend', ev=>{ if(isTap(ev)) closeSheet(); }, {passive:true});
document.getElementById('shHandle').addEventListener('click', closeSheet);
document.getElementById('shHandle').addEventListener('touchend', ev=>{ if(isTap(ev)) closeSheet(); }, {passive:true});

init();
</script>
